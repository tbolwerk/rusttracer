# rust-gpu requires a specific nightly plus these components. The exact channel
# date MUST match the rust-gpu / spirv-std version you depend on (see the
# rust-gpu release notes / cargo-gpu output). The date below is a placeholder;
# replace it with the one your toolchain pins, or let `cargo gpu` manage it.
[toolchain]
channel = "nightly-2024-11-22"
components = ["rust-src", "rustc-dev", "llvm-tools"]
